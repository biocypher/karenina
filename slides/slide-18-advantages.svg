<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="shadow18" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="100" y="80" font-family="Trebuchet MS, Arial, sans-serif" font-size="44" font-weight="bold" fill="#1A4565">Key Advantages</text>
  <rect x="100" y="92" width="260" height="4" rx="2" fill="#4285F4"/>

  <!-- ==================== CARD 1: Naturalistic Evaluation ==================== -->
  <g transform="translate(60, 140)">
    <rect width="330" height="640" rx="16" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1.5" filter="url(#shadow18)"/>
    <!-- Top color bar -->
    <rect x="0" y="0" width="330" height="6" rx="16" fill="#4285F4"/>
    <rect x="0" y="3" width="330" height="6" fill="#4285F4"/>

    <!-- Speech bubble illustration -->
    <g transform="translate(165, 110)">
      <!-- Main bubble -->
      <rect x="-60" y="-50" width="120" height="80" rx="14" fill="#4285F4" opacity="0.12"/>
      <rect x="-55" y="-45" width="110" height="70" rx="12" fill="#FFFFFF" stroke="#4285F4" stroke-width="2"/>
      <!-- Tail -->
      <polygon points="-20,25 -10,25 -30,45" fill="#FFFFFF" stroke="#4285F4" stroke-width="2"/>
      <rect x="-22" y="20" width="16" height="8" fill="#FFFFFF"/>
      <!-- Text lines inside bubble -->
      <rect x="-38" y="-32" width="60" height="4" rx="2" fill="#4285F4" opacity="0.35"/>
      <rect x="-38" y="-22" width="75" height="4" rx="2" fill="#4285F4" opacity="0.25"/>
      <rect x="-38" y="-12" width="50" height="4" rx="2" fill="#4285F4" opacity="0.35"/>
      <rect x="-38" y="-2" width="68" height="4" rx="2" fill="#4285F4" opacity="0.2"/>
      <rect x="-38" y="8" width="44" height="4" rx="2" fill="#4285F4" opacity="0.3"/>
      <!-- Smaller floating bubble -->
      <circle cx="65" cy="-30" r="8" fill="none" stroke="#4285F4" stroke-width="1.5" opacity="0.4"/>
      <circle cx="78" cy="-42" r="5" fill="none" stroke="#4285F4" stroke-width="1" opacity="0.3"/>
    </g>

    <!-- Title -->
    <text x="165" y="220" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Naturalistic</text>
    <text x="165" y="248" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Evaluation</text>

    <!-- Divider -->
    <line x1="40" y1="270" x2="290" y2="270" stroke="#E0E4E8" stroke-width="1"/>

    <!-- Description -->
    <text x="165" y="305" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">Models respond</text>
    <text x="165" y="330" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">freely, not in</text>
    <text x="165" y="355" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">forced formats.</text>
    <text x="165" y="395" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">Evaluate real</text>
    <text x="165" y="420" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">conversational</text>
    <text x="165" y="445" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">behavior.</text>
  </g>

  <!-- ==================== CARD 2: Portable Benchmarks ==================== -->
  <g transform="translate(420, 140)">
    <rect width="330" height="640" rx="16" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1.5" filter="url(#shadow18)"/>
    <!-- Top color bar -->
    <rect x="0" y="0" width="330" height="6" rx="16" fill="#0097A7"/>
    <rect x="0" y="3" width="330" height="6" fill="#0097A7"/>

    <!-- Suitcase illustration -->
    <g transform="translate(165, 105)">
      <!-- Handle -->
      <rect x="-18" y="-52" width="36" height="16" rx="6" fill="none" stroke="#0097A7" stroke-width="3"/>
      <!-- Body -->
      <rect x="-50" y="-36" width="100" height="72" rx="10" fill="#0097A7" opacity="0.12"/>
      <rect x="-48" y="-34" width="96" height="68" rx="8" fill="#FFFFFF" stroke="#0097A7" stroke-width="2.5"/>
      <!-- Clasp -->
      <rect x="-8" y="-38" width="16" height="8" rx="3" fill="#0097A7"/>
      <!-- JSON badge on suitcase -->
      <text x="0" y="-2" font-family="monospace" font-size="16" font-weight="bold" fill="#0097A7" text-anchor="middle" opacity="0.7">{ }</text>
      <!-- Straps -->
      <line x1="-15" y1="-26" x2="-15" y2="26" stroke="#0097A7" stroke-width="1.5" opacity="0.3"/>
      <line x1="15" y1="-26" x2="15" y2="26" stroke="#0097A7" stroke-width="1.5" opacity="0.3"/>
      <!-- Wheels -->
      <circle cx="-30" cy="40" r="5" fill="#0097A7" opacity="0.3"/>
      <circle cx="30" cy="40" r="5" fill="#0097A7" opacity="0.3"/>
    </g>

    <!-- Title -->
    <text x="165" y="220" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Portable</text>
    <text x="165" y="248" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Benchmarks</text>

    <!-- Divider -->
    <line x1="40" y1="270" x2="290" y2="270" stroke="#E0E4E8" stroke-width="1"/>

    <!-- Description -->
    <text x="165" y="305" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">Share via JSON-LD</text>
    <text x="165" y="330" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">checkpoints.</text>
    <text x="165" y="370" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">Reproducible across</text>
    <text x="165" y="395" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">teams, environments,</text>
    <text x="165" y="420" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">and time.</text>
  </g>

  <!-- ==================== CARD 3: Bootstrapped Authoring ==================== -->
  <g transform="translate(780, 140)">
    <rect width="330" height="640" rx="16" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1.5" filter="url(#shadow18)"/>
    <!-- Top color bar -->
    <rect x="0" y="0" width="330" height="6" rx="16" fill="#FFAB40"/>
    <rect x="0" y="3" width="330" height="6" fill="#FFAB40"/>

    <!-- Lightning bolt illustration -->
    <g transform="translate(165, 100)">
      <!-- Glow circle -->
      <circle cx="0" cy="0" r="45" fill="#FFAB40" opacity="0.08"/>
      <!-- Main lightning bolt -->
      <polygon points="-8,-50 20,-8 4,-8 16,50 -20,6 -2,6" fill="#FFAB40"/>
      <polygon points="-4,-42 14,-10 2,-10 12,42 -14,4 0,4" fill="#FFD180" opacity="0.5"/>
      <!-- Sparkles -->
      <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" fill="#FFAB40" transform="translate(40,-30)"/>
      <polygon points="0,-5 1.2,-1.2 5,0 1.2,1.2 0,5 -1.2,1.2 -5,0 -1.2,-1.2" fill="#FFAB40" transform="translate(-38,-20)"/>
      <polygon points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1" fill="#FFAB40" transform="translate(35,30)"/>
      <polygon points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1" fill="#FFAB40" transform="translate(-42,25)"/>
      <polygon points="0,-3 .8,-.8 3,0 .8,.8 0,3 -.8,.8 -3,0 -.8,-.8" fill="#FFAB40" transform="translate(50,5)"/>
    </g>

    <!-- Title -->
    <text x="165" y="220" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Bootstrapped</text>
    <text x="165" y="248" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Authoring</text>

    <!-- Divider -->
    <line x1="40" y1="270" x2="290" y2="270" stroke="#E0E4E8" stroke-width="1"/>

    <!-- Description -->
    <text x="165" y="305" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">From spreadsheet</text>
    <text x="165" y="330" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">to benchmark</text>
    <text x="165" y="355" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">in minutes.</text>
    <text x="165" y="395" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">LLMs generate the</text>
    <text x="165" y="420" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">infrastructure for you.</text>
  </g>

  <!-- ==================== CARD 4: Expressive Verification ==================== -->
  <g transform="translate(1140, 140)">
    <rect width="330" height="640" rx="16" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1.5" filter="url(#shadow18)"/>
    <!-- Top color bar -->
    <rect x="0" y="0" width="330" height="6" rx="16" fill="#4285F4"/>
    <rect x="0" y="3" width="330" height="6" fill="#4285F4"/>

    <!-- Puzzle pieces illustration -->
    <g transform="translate(165, 100)">
      <!-- Piece 1 (left) -->
      <g transform="translate(-30, 0)">
        <path d="M-35,-35 L5,-35 L5,-25 C5,-25 15,-30 15,-20 C15,-10 5,-15 5,-15 L5,5 L-5,5 L-5,15 C-5,15 -15,10 -15,20 C-15,30 -5,25 -5,25 L-5,35 L-35,35 Z" fill="#4285F4" opacity="0.85"/>
      </g>
      <!-- Piece 2 (right, interlocking) -->
      <g transform="translate(20, 0)">
        <path d="M-15,-35 L-15,-25 C-15,-25 -25,-30 -25,-20 C-25,-10 -15,-15 -15,-15 L-15,5 L-25,5 L-25,15 C-25,15 -35,10 -35,20 C-35,30 -25,25 -25,25 L-25,35 L35,35 L35,-35 Z" fill="#4285F4" opacity="0.55"/>
      </g>
      <!-- Labels on pieces -->
      <text x="-30" y="5" font-family="Roboto, Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">TPL</text>
      <text x="28" y="5" font-family="Roboto, Arial, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">RBR</text>
    </g>

    <!-- Title -->
    <text x="165" y="220" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Expressive</text>
    <text x="165" y="248" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Verification</text>

    <!-- Divider -->
    <line x1="40" y1="270" x2="290" y2="270" stroke="#E0E4E8" stroke-width="1"/>

    <!-- Description -->
    <text x="165" y="305" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">Templates + rubrics</text>
    <text x="165" y="330" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">cover any</text>
    <text x="165" y="355" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">evaluation need.</text>
    <text x="165" y="395" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">Structured and</text>
    <text x="165" y="420" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">qualitative in one.</text>
  </g>

  <!-- ==================== CARD 5: Resists Gaming ==================== -->
  <g transform="translate(1500, 140)">
    <rect width="330" height="640" rx="16" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1.5" filter="url(#shadow18)"/>
    <!-- Top color bar -->
    <rect x="0" y="0" width="330" height="6" rx="16" fill="#0097A7"/>
    <rect x="0" y="3" width="330" height="6" fill="#0097A7"/>

    <!-- Shield with lock illustration -->
    <g transform="translate(165, 95)">
      <!-- Shield shape -->
      <path d="M0,-50 L45,-35 L45,10 C45,40 0,60 0,60 C0,60 -45,40 -45,10 L-45,-35 Z" fill="#0097A7" opacity="0.12" stroke="#0097A7" stroke-width="2"/>
      <path d="M0,-42 L38,-29 L38,8 C38,34 0,52 0,52 C0,52 -38,34 -38,8 L-38,-29 Z" fill="#FFFFFF" stroke="#0097A7" stroke-width="1.5"/>
      <!-- Lock -->
      <rect x="-12" y="-5" width="24" height="20" rx="4" fill="#0097A7"/>
      <path d="M-7,-5 L-7,-14 C-7,-22 7,-22 7,-14 L7,-5" fill="none" stroke="#0097A7" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Keyhole -->
      <circle cx="0" cy="5" r="4" fill="#FFFFFF"/>
      <rect x="-1.5" y="5" width="3" height="7" rx="1" fill="#FFFFFF"/>
    </g>

    <!-- Title -->
    <text x="165" y="220" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Resists</text>
    <text x="165" y="248" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">Gaming</text>

    <!-- Divider -->
    <line x1="40" y1="270" x2="290" y2="270" stroke="#E0E4E8" stroke-width="1"/>

    <!-- Description -->
    <text x="165" y="305" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">Custom benchmarks</text>
    <text x="165" y="330" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">cannot be</text>
    <text x="165" y="355" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">optimized for.</text>
    <text x="165" y="395" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">Private evaluations</text>
    <text x="165" y="420" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="middle">stay meaningful.</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="1074" width="1920" height="6" fill="#4285F4"/>
</svg>