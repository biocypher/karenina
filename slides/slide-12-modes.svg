    <rect x="645" y="233" width="140" height="48" rx="8" fill="#4285F4"/>
  </g>
  <text x="715" y="263" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Guards</text>
