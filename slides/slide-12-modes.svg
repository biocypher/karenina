    <circle cx="10" cy="10" r="9" fill="rgba(255,255,255,0.3)" stroke="#FFFFFF" stroke-width="1.2"/>
    <polyline points="5,10 8,13 15,6" fill="none" stroke="#FFFFFF" stroke-width="1.8"/>
  </g>
  <!-- Arrow (dimmed) -->
  <line x1="1110" y1="257" x2="1122" y2="257" stroke="#B0BEC5" stroke-width="2" marker-end="url(#arrGray)"/>

