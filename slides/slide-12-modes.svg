    <text x="478" y="13" font-family="Roboto, Arial, sans-serif" font-size="16" fill="#78909C">Skipped</text>
  </g>

  </g><!-- end content group -->

  <!-- ====================================================================== -->
  <!-- Bottom accent bar                                                      -->
  <!-- ====================================================================== -->
  <rect x="0" y="1074" width="1920" height="6" fill="#4285F4"/>
