    <rect x="80" y="230" width="280" height="52" rx="8" fill="#4285F4"/>
  </g>
  <text x="220" y="263" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="22" font-weight="bold" fill="#FFFFFF">template_only</text>

  <!-- Pipeline blocks -->
  <!-- Generate (active) -->
  <g filter="url(#shadowSm)">
    <rect x="485" y="233" width="140" height="48" rx="8" fill="#4285F4"/>
  </g>
  <text x="555" y="263" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Generate</text>
  <!-- Arrow -->
  <line x1="630" y1="257" x2="642" y2="257" stroke="#4285F4" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- Guards (active) -->
