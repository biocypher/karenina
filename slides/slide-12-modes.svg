  </g>
  <text x="715" y="663" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Guards</text>
  <line x1="790" y1="657" x2="802" y2="657" stroke="#0097A7" stroke-width="2" marker-end="url(#arrTeal)"/>

  <!-- Pre-Parse (active) -->
  <g filter="url(#shadowSm)">
    <rect x="805" y="633" width="140" height="48" rx="8" fill="#0097A7"/>
  </g>
  <text x="875" y="663" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Pre-Parse</text>
  <!-- Arrow (dimmed to template) -->
