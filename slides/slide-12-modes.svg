<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="112%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- Mode label gradients -->
    <linearGradient id="gradMode2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrBlue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#4285F4"/>
    </marker>
    <marker id="arrTeal" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#0097A7"/>
    </marker>
    <marker id="arrGray" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#B0BEC5"/>
    </marker>
    <marker id="arrGreen" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#4CAF50"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="100" y="80" font-family="Trebuchet MS, Arial, sans-serif" font-size="44" font-weight="bold" fill="#1A4565">Three Evaluation Modes</text>
  <!-- Blue underline -->
  <rect x="100" y="94" width="180" height="4" rx="2" fill="#4285F4"/>

  <!-- ====================================================================== -->
  <!-- CONTENT GROUP (shifted down for centering)                             -->
  <!-- ====================================================================== -->
  <g transform="translate(0,90)">

  <!-- Column headers (subtle, above strip 1) -->
  <text x="555" y="172" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="14" fill="#78909C" opacity="0.7">Generate</text>
  <text x="715" y="172" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="14" fill="#78909C" opacity="0.7">Guards</text>
  <text x="875" y="172" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="14" fill="#78909C" opacity="0.7">Pre-Parse</text>
  <text x="1035" y="172" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="14" fill="#4285F4" opacity="0.7">Template</text>
  <text x="1195" y="172" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="14" fill="#0097A7" opacity="0.7">Rubric</text>
  <text x="1355" y="172" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="14" fill="#78909C" opacity="0.7">Finalize</text>

  <!-- ====================================================================== -->
  <!-- STRIP 1: template_only (y center ~280)                                 -->
  <!-- ====================================================================== -->

  <!-- Mode name card -->
