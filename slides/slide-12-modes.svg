  <rect x="1125" y="233" width="140" height="48" rx="8" fill="#E0E4E8" opacity="0.6"/>
  <text x="1195" y="263" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="15" fill="#B0BEC5" text-decoration="line-through">Rubric</text>
