<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <style>
      .title-font { font-family: "Trebuchet MS", Arial, sans-serif; }
      .body-font { font-family: Roboto, Arial, sans-serif; }
    </style>
    <!-- Drop shadows -->
    <filter id="shadow" x="-4%" y="-4%" width="112%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowLg" x="-4%" y="-4%" width="112%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSm" x="-6%" y="-6%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <!-- Left panel header gradient (blue) -->
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#5C9CF5"/>
    </linearGradient>
    <!-- Right panel header gradient (teal) -->
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0097A7"/>
      <stop offset="100%" stop-color="#26B0BF"/>
    </linearGradient>
    <!-- Banner gradient -->
    <linearGradient id="bannerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFBF0"/>
    </linearGradient>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>

  <!-- ========== BOTTOM ACCENT BAR ========== -->
  <rect x="0" y="1074" width="1920" height="6" fill="#4285F4"/>

  <!-- ========== TITLE ========== -->
  <text x="100" y="80" class="title-font" fill="#1A4565" font-size="44" font-weight="bold">The Ground-Truth Boundary</text>
  <!-- Blue underline -->
  <rect x="100" y="94" width="480" height="4" rx="2" fill="#4285F4"/>

  <!-- Subtitle -->
  <text x="100" y="128" class="body-font" fill="#78909C" font-size="18">Where correctness checking ends and response quality evaluation begins</text>

  <!-- ========== VERTICAL DIVIDER ========== -->
  <line x1="960" y1="190" x2="960" y2="870" stroke="#4285F4" stroke-width="3" stroke-dasharray="12,8" opacity="0.6"/>
  <!-- Diamond at top of divider -->
  <g transform="translate(960, 178) rotate(45)">
    <rect x="-10" y="-10" width="20" height="20" rx="3" fill="#4285F4"/>
  </g>
  <!-- "vs" label on divider -->
  <g transform="translate(960, 530)">
    <circle cx="0" cy="0" r="22" fill="#FFFFFF" stroke="#4285F4" stroke-width="2"/>
    <text x="0" y="6" class="body-font" fill="#4285F4" font-size="14" font-weight="bold" text-anchor="middle">vs</text>
  </g>

  <!-- ================================================================ -->
  <!-- LEFT PANEL: "Needs Ground Truth" (x: 80 to 920) -->
  <!-- ================================================================ -->

  <!-- Panel header card -->
  <rect x="80" y="160" width="840" height="60" rx="12" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <!-- Template/blueprint icon on left -->
  <g transform="translate(104, 174)">
    <rect x="0" y="0" width="28" height="34" rx="4" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="7" y1="10" x2="21" y2="10" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <line x1="7" y1="17" x2="21" y2="17" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <line x1="7" y1="24" x2="21" y2="24" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
  </g>
  <text x="148" y="198" class="body-font" fill="#FFFFFF" font-size="28" font-weight="bold">Needs Ground Truth</text>

  <!-- Large container card -->
  <rect x="80" y="240" width="840" height="610" rx="14" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1" filter="url(#shadowLg)"/>

  <!-- "Answer Template" label with document icon -->
  <g transform="translate(120, 272)">
    <!-- Document icon -->
    <rect x="0" y="0" width="20" height="24" rx="3" fill="#4285F4" opacity="0.2"/>
    <rect x="4" y="4" width="12" height="2" rx="1" fill="#4285F4"/>
    <rect x="4" y="9" width="12" height="2" rx="1" fill="#4285F4"/>
    <rect x="4" y="14" width="8" height="2" rx="1" fill="#4285F4"/>
  </g>
  <text x="152" y="292" class="body-font" fill="#4285F4" font-size="22" font-weight="bold">Answer Template</text>

  <!-- Example card 1 -->
  <g transform="translate(120, 314)">
    <rect x="0" y="0" width="760" height="72" rx="8" fill="#FFFFFF" filter="url(#shadowSm)"/>
    <!-- Left accent border -->
    <rect x="0" y="0" width="4" height="72" rx="2" fill="#4285F4"/>
    <!-- Magnifying glass icon -->
    <g transform="translate(24, 22)">
      <circle cx="12" cy="12" r="9" fill="none" stroke="#4285F4" stroke-width="2"/>
      <line x1="19" y1="19" x2="26" y2="26" stroke="#4285F4" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="64" y="43" class="body-font" fill="#1A4565" font-size="19">"Did it identify BCL2 as the target?"</text>
  </g>

  <!-- Example card 2 -->
  <g transform="translate(120, 400)">
    <rect x="0" y="0" width="760" height="72" rx="8" fill="#FFFFFF" filter="url(#shadowSm)"/>
    <rect x="0" y="0" width="4" height="72" rx="2" fill="#4285F4"/>
    <g transform="translate(24, 22)">
      <circle cx="12" cy="12" r="9" fill="none" stroke="#4285F4" stroke-width="2"/>
      <line x1="19" y1="19" x2="26" y2="26" stroke="#4285F4" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="64" y="43" class="body-font" fill="#1A4565" font-size="19">"Is the mechanism of action accurate?"</text>
  </g>

  <!-- Example card 3 -->
  <g transform="translate(120, 486)">
    <rect x="0" y="0" width="760" height="72" rx="8" fill="#FFFFFF" filter="url(#shadowSm)"/>
    <rect x="0" y="0" width="4" height="72" rx="2" fill="#4285F4"/>
    <g transform="translate(24, 22)">
      <circle cx="12" cy="12" r="9" fill="none" stroke="#4285F4" stroke-width="2"/>
      <line x1="19" y1="19" x2="26" y2="26" stroke="#4285F4" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="64" y="43" class="body-font" fill="#1A4565" font-size="19">"Does it name the correct indication?"</text>
  </g>

  <!-- Visual indicator: lock/key concept -->
  <g transform="translate(420, 590)">
    <!-- Key icon -->
    <circle cx="20" cy="20" r="12" fill="none" stroke="#4285F4" stroke-width="2" opacity="0.4"/>
    <line x1="32" y1="20" x2="54" y2="20" stroke="#4285F4" stroke-width="2" opacity="0.4"/>
    <line x1="46" y1="20" x2="46" y2="28" stroke="#4285F4" stroke-width="2" opacity="0.4"/>
    <line x1="52" y1="20" x2="52" y2="26" stroke="#4285F4" stroke-width="2" opacity="0.4"/>
  </g>

  <!-- Bottom annotation -->
  <text x="348" y="646" class="body-font" fill="#78909C" font-size="18" font-style="italic" text-anchor="middle">Requires knowing the correct answer</text>

  <!-- How it works mini explanation -->
  <g transform="translate(120, 680)">
    <rect x="0" y="0" width="760" height="80" rx="10" fill="#4285F4" fill-opacity="0.06" stroke="#4285F4" stroke-width="1" stroke-opacity="0.2"/>
    <text x="24" y="30" class="body-font" fill="#4285F4" font-size="16" font-weight="bold">How it works</text>
    <text x="24" y="56" class="body-font" fill="#78909C" font-size="16">verify() compares parsed fields to known-correct values.</text>
    <text x="24" y="74" class="body-font" fill="#78909C" font-size="16">The template defines both the schema and the expected answers.</text>
  </g>

  <!-- ================================================================ -->
  <!-- RIGHT PANEL: "Observable in Text" (x: 1000 to 1840) -->
  <!-- ================================================================ -->

  <!-- Panel header card -->
  <rect x="1000" y="160" width="840" height="60" rx="12" fill="url(#tealGrad)" filter="url(#shadow)"/>
  <!-- Checklist icon -->
  <g transform="translate(1024, 174)">
    <rect x="0" y="0" width="28" height="34" rx="4" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <polyline points="6,10 10,14 16,7" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="6" y1="22" x2="22" y2="22" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <line x1="6" y1="28" x2="16" y2="28" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
  </g>
  <text x="1068" y="198" class="body-font" fill="#FFFFFF" font-size="28" font-weight="bold">Observable in Text</text>

  <!-- Large container card -->
  <rect x="1000" y="240" width="840" height="610" rx="14" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1" filter="url(#shadowLg)"/>

  <!-- "Rubric Trait" label with checklist icon -->
  <g transform="translate(1040, 272)">
    <rect x="0" y="0" width="20" height="24" rx="3" fill="#0097A7" opacity="0.2"/>
    <polyline points="4,8 8,12 14,5" fill="none" stroke="#0097A7" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="18" x2="16" y2="18" stroke="#0097A7" stroke-width="1.5"/>
  </g>
  <text x="1072" y="292" class="body-font" fill="#0097A7" font-size="22" font-weight="bold">Rubric Trait</text>

  <!-- Example card 1 -->
  <g transform="translate(1040, 314)">
    <rect x="0" y="0" width="760" height="72" rx="8" fill="#FFFFFF" filter="url(#shadowSm)"/>
    <rect x="0" y="0" width="4" height="72" rx="2" fill="#0097A7"/>
    <!-- Eye icon (observable) -->
    <g transform="translate(24, 22)">
      <ellipse cx="14" cy="14" rx="12" ry="8" fill="none" stroke="#0097A7" stroke-width="2"/>
      <circle cx="14" cy="14" r="4" fill="#0097A7"/>
    </g>
    <text x="64" y="43" class="body-font" fill="#1A4565" font-size="19">"Does it cite specific trials or data?"</text>
  </g>

  <!-- Example card 2 -->
  <g transform="translate(1040, 400)">
    <rect x="0" y="0" width="760" height="72" rx="8" fill="#FFFFFF" filter="url(#shadowSm)"/>
    <rect x="0" y="0" width="4" height="72" rx="2" fill="#0097A7"/>
    <g transform="translate(24, 22)">
      <ellipse cx="14" cy="14" rx="12" ry="8" fill="none" stroke="#0097A7" stroke-width="2"/>
      <circle cx="14" cy="14" r="4" fill="#0097A7"/>
    </g>
    <text x="64" y="43" class="body-font" fill="#1A4565" font-size="19">"Is reasoning presented step-by-step?"</text>
  </g>

  <!-- Example card 3 -->
  <g transform="translate(1040, 486)">
    <rect x="0" y="0" width="760" height="72" rx="8" fill="#FFFFFF" filter="url(#shadowSm)"/>
    <rect x="0" y="0" width="4" height="72" rx="2" fill="#0097A7"/>
    <g transform="translate(24, 22)">
      <ellipse cx="14" cy="14" rx="12" ry="8" fill="none" stroke="#0097A7" stroke-width="2"/>
      <circle cx="14" cy="14" r="4" fill="#0097A7"/>
    </g>
    <text x="64" y="43" class="body-font" fill="#1A4565" font-size="19">"Does it hedge appropriately on off-label use?"</text>
  </g>

  <!-- Visual indicator: eye concept -->
  <g transform="translate(1380, 586)">
    <ellipse cx="20" cy="16" rx="18" ry="12" fill="none" stroke="#0097A7" stroke-width="2" opacity="0.35"/>
    <circle cx="20" cy="16" r="6" fill="#0097A7" opacity="0.25"/>
  </g>

  <!-- Bottom annotation -->
  <text x="1268" y="646" class="body-font" fill="#78909C" font-size="18" font-style="italic" text-anchor="middle">Judged by reading the response alone</text>

  <!-- How it works mini explanation -->
  <g transform="translate(1040, 680)">
    <rect x="0" y="0" width="760" height="80" rx="10" fill="#0097A7" fill-opacity="0.06" stroke="#0097A7" stroke-width="1" stroke-opacity="0.2"/>
    <text x="24" y="30" class="body-font" fill="#0097A7" font-size="16" font-weight="bold">How it works</text>
    <text x="24" y="56" class="body-font" fill="#78909C" font-size="16">An evaluator LLM reads the response and scores each trait.</text>
    <text x="24" y="74" class="body-font" fill="#78909C" font-size="16">No access to ground truth, only the question and response text.</text>
  </g>

  <!-- ================================================================ -->
  <!-- BOTTOM BANNER: Litmus Test -->
  <!-- ================================================================ -->
  <g transform="translate(260, 886)">
    <rect x="0" y="0" width="1400" height="80" rx="14" fill="url(#bannerGrad)" stroke="#FFAB40" stroke-width="2.5" filter="url(#shadowLg)"/>

    <!-- Lightbulb icon -->
    <g transform="translate(30, 14)">
      <!-- Bulb -->
      <circle cx="22" cy="20" r="16" fill="#FFAB40" opacity="0.2"/>
      <path d="M22,6 Q34,6 34,20 Q34,30 26,34 L18,34 Q12,30 12,20 Q12,6 22,6 Z" fill="none" stroke="#FFAB40" stroke-width="2.5"/>
      <!-- Filament -->
      <path d="M18,20 Q22,26 26,20" fill="none" stroke="#FFAB40" stroke-width="2"/>
      <!-- Base -->
      <line x1="18" y1="36" x2="26" y2="36" stroke="#FFAB40" stroke-width="2"/>
      <line x1="18" y1="40" x2="26" y2="40" stroke="#FFAB40" stroke-width="2"/>
      <!-- Rays -->
      <line x1="22" y1="-2" x2="22" y2="-6" stroke="#FFAB40" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="36" y1="8" x2="40" y2="4" stroke="#FFAB40" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
      <line x1="8" y1="8" x2="4" y2="4" stroke="#FFAB40" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Text -->
    <text x="100" y="35" class="body-font" fill="#1A4565" font-size="22" font-weight="bold">Litmus test:</text>
    <text x="240" y="35" class="body-font" fill="#1A4565" font-size="22">Can the evaluator judge without knowing the answer?</text>
    <text x="100" y="62" class="body-font" fill="#78909C" font-size="17">If yes, use a rubric trait. If no, put it in the answer template's verify() method.</text>
  </g>

  <!-- ========== DECORATIVE ELEMENTS ========== -->
  <!-- Subtle corner accents -->
  <g transform="translate(1800, 40)" opacity="0.06">
    <circle cx="0" cy="0" r="70" fill="#4285F4"/>
    <circle cx="50" cy="50" r="40" fill="#0097A7"/>
  </g>

</svg>