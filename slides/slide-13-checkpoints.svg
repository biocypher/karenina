<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Shadows -->
    <filter id="shadowLarge" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#1A4565" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowMedium" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1A4565" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSmall" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#1A4565" flood-opacity="0.08"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4285F4"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#0097A7"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#FFAB40"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="1074" width="1920" height="6" fill="#4285F4"/>

  <!-- Title -->
  <text x="100" y="80" font-family="Trebuchet MS, Arial, sans-serif" font-size="44" font-weight="bold" fill="#1A4565">Portable Checkpoints</text>
  <!-- Title underline -->
  <rect x="100" y="94" width="200" height="4" rx="2" fill="#4285F4"/>

  <!-- Content group shifted down for vertical centering -->
  <g transform="translate(0,70)">
  <!-- ============================================ -->
  <!-- CENTRAL FILE CARD                            -->
  <!-- ============================================ -->
  <g filter="url(#shadowLarge)">
    <!-- Main card body -->
    <rect x="710" y="225" width="500" height="450" rx="16" fill="#FFFFFF" stroke="#4285F4" stroke-width="2"/>
    <!-- Folded corner triangle (top-right) -->
    <path d="M1170,225 L1210,225 L1210,265 Z" fill="#F5F7FA" stroke="#4285F4" stroke-width="2"/>
    <path d="M1170,225 L1170,265 L1210,265" fill="#E8F0FE" stroke="#4285F4" stroke-width="1.5" stroke-linejoin="round"/>
  </g>

  <!-- .jsonld pill badge -->
  <rect x="880" y="240" width="120" height="34" rx="17" fill="#4285F4"/>
  <text x="940" y="263" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">.jsonld</text>

  <!-- Content block 1: metadata -->
  <rect x="740" y="300" width="440" height="60" rx="8" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1.5"/>
  <circle cx="770" cy="330" r="10" fill="#4285F4"/>
  <text x="792" y="336" font-family="Roboto, Arial, sans-serif" font-size="20" fill="#1A4565">metadata</text>

  <!-- Content block 2: questions + ground truth -->
  <rect x="740" y="374" width="440" height="60" rx="8" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1.5"/>
  <circle cx="770" cy="404" r="10" fill="#0097A7"/>
  <text x="792" y="410" font-family="Roboto, Arial, sans-serif" font-size="20" fill="#1A4565">questions + ground truth</text>

  <!-- Content block 3: templates + rubrics -->
  <rect x="740" y="448" width="440" height="60" rx="8" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1.5"/>
  <circle cx="770" cy="478" r="10" fill="#FFAB40"/>
  <text x="792" y="484" font-family="Roboto, Arial, sans-serif" font-size="20" fill="#1A4565">templates + rubrics</text>

  <!-- Content block 4: traits + configurations -->
  <rect x="740" y="522" width="440" height="60" rx="8" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1.5"/>
  <circle cx="770" cy="552" r="10" fill="#78909C"/>
  <text x="792" y="558" font-family="Roboto, Arial, sans-serif" font-size="20" fill="#1A4565">traits + configurations</text>

  <!-- Small file icon on left edge of card -->
  <rect x="722" y="610" width="36" height="44" rx="4" fill="#FFFFFF" stroke="#4285F4" stroke-width="1.5"/>
  <line x1="732" y1="622" x2="748" y2="622" stroke="#4285F4" stroke-width="1.2"/>
  <line x1="732" y1="632" x2="748" y2="632" stroke="#4285F4" stroke-width="1.2"/>
  <line x1="732" y1="642" x2="742" y2="642" stroke="#4285F4" stroke-width="1.2"/>

  <!-- ============================================ -->
  <!-- DESTINATION 1: Git Repository (upper-left)   -->
  <!-- ============================================ -->
  <g filter="url(#shadowMedium)">
    <rect x="60" y="200" width="280" height="140" rx="12" fill="#F5F7FA"/>
  </g>
  <!-- Git branch icon -->
  <g transform="translate(100, 235)">
    <circle cx="0" cy="0" r="7" fill="none" stroke="#4285F4" stroke-width="2.5"/>
    <circle cx="0" cy="40" r="7" fill="none" stroke="#4285F4" stroke-width="2.5"/>
    <circle cx="36" cy="14" r="7" fill="none" stroke="#4285F4" stroke-width="2.5"/>
    <line x1="0" y1="7" x2="0" y2="33" stroke="#4285F4" stroke-width="2.5"/>
    <path d="M0,12 C0,20 20,14 29,14" fill="none" stroke="#4285F4" stroke-width="2.5"/>
  </g>
  <text x="155" y="260" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565">Git Repository</text>
  <text x="155" y="284" font-family="Roboto, Arial, sans-serif" font-size="16" fill="#78909C">Version control</text>

  <!-- Curved arrow: center card to Git -->
  <path d="M710,340 C580,310 470,270 348,270" fill="none" stroke="#4285F4" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrowBlue)"/>

  <!-- ============================================ -->
  <!-- DESTINATION 2: Colleague's Machine (lower-left) -->
  <!-- ============================================ -->
  <g filter="url(#shadowMedium)">
    <rect x="60" y="620" width="280" height="140" rx="12" fill="#F5F7FA"/>
  </g>
  <!-- Laptop icon -->
  <g transform="translate(90, 660)">
    <!-- Screen -->
    <rect x="0" y="0" width="50" height="34" rx="3" fill="none" stroke="#0097A7" stroke-width="2.5"/>
    <!-- Screen content lines -->
    <line x1="8" y1="10" x2="42" y2="10" stroke="#0097A7" stroke-width="1.5" opacity="0.5"/>
    <line x1="8" y1="18" x2="34" y2="18" stroke="#0097A7" stroke-width="1.5" opacity="0.5"/>
    <!-- Keyboard base -->
    <path d="M-6,36 L56,36 L52,44 L-2,44 Z" fill="none" stroke="#0097A7" stroke-width="2.5" stroke-linejoin="round"/>
  </g>
  <text x="155" y="695" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565">Colleague's Machine</text>
  <text x="155" y="719" font-family="Roboto, Arial, sans-serif" font-size="16" fill="#78909C">Share &amp; reproduce</text>

  <!-- Curved arrow: center card to Colleague -->
  <path d="M710,520 C570,560 440,620 348,680" fill="none" stroke="#0097A7" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrowTeal)"/>

  <!-- ============================================ -->
  <!-- DESTINATION 3: CI/CD Pipeline (right)        -->
  <!-- ============================================ -->
  <g filter="url(#shadowMedium)">
    <rect x="1410" y="380" width="280" height="140" rx="12" fill="#F5F7FA"/>
  </g>
  <!-- CI/CD icon: circular arrows with gear -->
  <g transform="translate(1450, 420)">
    <!-- Circular arrow path -->
    <path d="M20,0 A20,20 0 1,1 0,20" fill="none" stroke="#FFAB40" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
    <path d="M20,40 A20,20 0 1,1 40,20" fill="none" stroke="#FFAB40" stroke-width="2.5"/>
    <!-- Gear center -->
    <circle cx="20" cy="20" r="6" fill="none" stroke="#FFAB40" stroke-width="2"/>
    <circle cx="20" cy="20" r="2" fill="#FFAB40"/>
    <!-- Gear teeth -->
    <line x1="20" y1="11" x2="20" y2="14" stroke="#FFAB40" stroke-width="2.5"/>
    <line x1="20" y1="26" x2="20" y2="29" stroke="#FFAB40" stroke-width="2.5"/>
    <line x1="11" y1="20" x2="14" y2="20" stroke="#FFAB40" stroke-width="2.5"/>
    <line x1="26" y1="20" x2="29" y2="20" stroke="#FFAB40" stroke-width="2.5"/>
  </g>
  <text x="1510" y="455" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565">CI / CD Pipeline</text>
  <text x="1510" y="479" font-family="Roboto, Arial, sans-serif" font-size="16" fill="#78909C">Automated testing</text>

  <!-- Curved arrow: center card to CI/CD -->
  <path d="M1210,450 C1280,450 1340,450 1402,450" fill="none" stroke="#FFAB40" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrowAmber)"/>
  </g>

  <!-- ============================================ -->
  <!-- BOTTOM PILL BADGES                           -->
  <!-- ============================================ -->
  <!-- Self-contained -->
  <rect x="580" y="905" width="200" height="42" rx="21" fill="#4285F4" fill-opacity="0.10"/>
  <text x="680" y="932" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="18" font-weight="bold" fill="#4285F4">Self-contained</text>

  <!-- Human-readable -->
  <rect x="810" y="905" width="210" height="42" rx="21" fill="#0097A7" fill-opacity="0.10"/>
  <text x="915" y="932" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="18" font-weight="bold" fill="#0097A7">Human-readable</text>

  <!-- Version-controllable -->
  <rect x="1050" y="905" width="250" height="42" rx="21" fill="#78909C" fill-opacity="0.10"/>
  <text x="1175" y="932" text-anchor="middle" font-family="Roboto, Arial, sans-serif" font-size="18" font-weight="bold" fill="#78909C">Version-controllable</text>
</svg>