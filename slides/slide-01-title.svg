<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- Subtle gradient for decorative circles -->
    <linearGradient id="circleGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0097A7" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="circleGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="circleGrad3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0097A7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="circleGrad4" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0097A7" stop-opacity="0.20"/>
    </linearGradient>

    <!-- Accent bar gradient -->
    <linearGradient id="accentBarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>

  <!-- ============================================ -->
  <!-- DECORATIVE MOLECULAR/NETWORK PATTERN         -->
  <!-- Upper-right area, ~600x400px                 -->
  <!-- ============================================ -->

  <!-- Large circles at various opacities -->
  <circle cx="1520" cy="120" r="80" fill="url(#circleGrad1)"/>
  <circle cx="1680" cy="180" r="60" fill="url(#circleGrad2)"/>
  <circle cx="1400" cy="220" r="50" fill="url(#circleGrad3)"/>
  <circle cx="1600" cy="320" r="70" fill="url(#circleGrad4)"/>
  <circle cx="1750" cy="80" r="40" fill="url(#circleGrad1)"/>
  <circle cx="1340" cy="100" r="35" fill="url(#circleGrad2)"/>
  <circle cx="1460" cy="350" r="55" fill="url(#circleGrad3)"/>
  <circle cx="1780" cy="280" r="45" fill="url(#circleGrad4)"/>
  <circle cx="1550" cy="440" r="38" fill="url(#circleGrad1)"/>
  <circle cx="1700" cy="420" r="30" fill="url(#circleGrad2)"/>
  <circle cx="1850" cy="180" r="55" fill="url(#circleGrad3)"/>
  <circle cx="1300" cy="300" r="28" fill="url(#circleGrad4)"/>

  <!-- Smaller accent circles -->
  <circle cx="1380" cy="160" r="18" fill="#4285F4" opacity="0.12"/>
  <circle cx="1650" cy="100" r="22" fill="#0097A7" opacity="0.15"/>
  <circle cx="1500" cy="280" r="15" fill="#4285F4" opacity="0.18"/>
  <circle cx="1820" cy="350" r="20" fill="#0097A7" opacity="0.10"/>
  <circle cx="1430" cy="420" r="16" fill="#4285F4" opacity="0.14"/>
  <circle cx="1680" cy="460" r="12" fill="#0097A7" opacity="0.16"/>
  <circle cx="1350" cy="380" r="10" fill="#4285F4" opacity="0.20"/>
  <circle cx="1760" cy="150" r="14" fill="#4285F4" opacity="0.10"/>

  <!-- Connecting lines (thin, network feel) -->
  <line x1="1520" y1="120" x2="1680" y2="180" stroke="#4285F4" stroke-width="1.5" opacity="0.15"/>
  <line x1="1520" y1="120" x2="1400" y2="220" stroke="#4285F4" stroke-width="1.5" opacity="0.12"/>
  <line x1="1680" y1="180" x2="1600" y2="320" stroke="#4285F4" stroke-width="1.5" opacity="0.15"/>
  <line x1="1400" y1="220" x2="1600" y2="320" stroke="#0097A7" stroke-width="1.5" opacity="0.12"/>
  <line x1="1750" y1="80" x2="1680" y2="180" stroke="#4285F4" stroke-width="1.5" opacity="0.10"/>
  <line x1="1340" y1="100" x2="1520" y2="120" stroke="#0097A7" stroke-width="1.5" opacity="0.12"/>
  <line x1="1340" y1="100" x2="1400" y2="220" stroke="#4285F4" stroke-width="1.5" opacity="0.10"/>
  <line x1="1460" y1="350" x2="1600" y2="320" stroke="#4285F4" stroke-width="1.5" opacity="0.15"/>
  <line x1="1460" y1="350" x2="1400" y2="220" stroke="#0097A7" stroke-width="1.5" opacity="0.12"/>
  <line x1="1780" y1="280" x2="1680" y2="180" stroke="#4285F4" stroke-width="1.5" opacity="0.12"/>
  <line x1="1780" y1="280" x2="1600" y2="320" stroke="#0097A7" stroke-width="1.5" opacity="0.10"/>
  <line x1="1850" y1="180" x2="1750" y2="80" stroke="#4285F4" stroke-width="1.5" opacity="0.12"/>
  <line x1="1850" y1="180" x2="1780" y2="280" stroke="#0097A7" stroke-width="1.5" opacity="0.10"/>
  <line x1="1550" y1="440" x2="1460" y2="350" stroke="#4285F4" stroke-width="1.5" opacity="0.12"/>
  <line x1="1550" y1="440" x2="1600" y2="320" stroke="#0097A7" stroke-width="1.5" opacity="0.10"/>
  <line x1="1700" y1="420" x2="1600" y2="320" stroke="#4285F4" stroke-width="1.5" opacity="0.12"/>
  <line x1="1700" y1="420" x2="1780" y2="280" stroke="#0097A7" stroke-width="1.5" opacity="0.10"/>
  <line x1="1300" y1="300" x2="1400" y2="220" stroke="#4285F4" stroke-width="1.5" opacity="0.10"/>
  <line x1="1300" y1="300" x2="1460" y2="350" stroke="#0097A7" stroke-width="1.5" opacity="0.08"/>
  <line x1="1380" y1="160" x2="1400" y2="220" stroke="#4285F4" stroke-width="1" opacity="0.10"/>
  <line x1="1380" y1="160" x2="1340" y2="100" stroke="#4285F4" stroke-width="1" opacity="0.08"/>
  <line x1="1650" y1="100" x2="1680" y2="180" stroke="#0097A7" stroke-width="1" opacity="0.10"/>
  <line x1="1650" y1="100" x2="1750" y2="80" stroke="#4285F4" stroke-width="1" opacity="0.08"/>
  <line x1="1500" y1="280" x2="1460" y2="350" stroke="#4285F4" stroke-width="1" opacity="0.10"/>
  <line x1="1820" y1="350" x2="1780" y2="280" stroke="#0097A7" stroke-width="1" opacity="0.10"/>

  <!-- Small node dots at intersections -->
  <circle cx="1520" cy="120" r="5" fill="#4285F4" opacity="0.35"/>
  <circle cx="1680" cy="180" r="4" fill="#4285F4" opacity="0.30"/>
  <circle cx="1400" cy="220" r="4" fill="#0097A7" opacity="0.30"/>
  <circle cx="1600" cy="320" r="5" fill="#4285F4" opacity="0.35"/>
  <circle cx="1750" cy="80" r="3" fill="#4285F4" opacity="0.30"/>
  <circle cx="1460" cy="350" r="4" fill="#0097A7" opacity="0.30"/>
  <circle cx="1780" cy="280" r="3" fill="#4285F4" opacity="0.30"/>
  <circle cx="1850" cy="180" r="4" fill="#0097A7" opacity="0.25"/>
  <circle cx="1550" cy="440" r="3" fill="#4285F4" opacity="0.25"/>
  <circle cx="1700" cy="420" r="3" fill="#0097A7" opacity="0.25"/>

  <!-- ============================================ -->
  <!-- TITLE TEXT                                    -->
  <!-- ============================================ -->

  <!-- "Karenina" main title -->
  <text x="100" y="450" font-family="Trebuchet MS, Arial, sans-serif" font-size="80" font-weight="bold" fill="#1A4565">Karenina</text>

  <!-- Thin horizontal accent line below title -->
  <rect x="100" y="470" width="200" height="3" rx="1.5" fill="#4285F4"/>

  <!-- Subtitle -->
  <text x="100" y="520" font-family="Roboto, Arial, sans-serif" font-size="28" fill="#78909C">Structured LLM Evaluation Through Answer Templates and Rubrics</text>

  <!-- ============================================ -->
  <!-- BOTTOM ELEMENTS                               -->
  <!-- ============================================ -->

  <!-- Full-width accent bar at bottom -->
  <rect x="0" y="1074" width="1920" height="6" fill="url(#accentBarGrad)"/>

  <!-- GitHub URL bottom-right -->
  <text x="1820" y="1050" font-family="Roboto, Arial, sans-serif" font-size="18" fill="#78909C" text-anchor="end">github.com/biocypher/karenina</text>

</svg>