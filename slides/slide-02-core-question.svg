<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSmall" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000000" flood-opacity="0.08"/>
    </filter>

    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F7FA"/>
    </linearGradient>

    <!-- Chat bubble gradient (user) -->
    <linearGradient id="userBubbleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0.08"/>
    </linearGradient>

    <!-- AI bubble gradient -->
    <linearGradient id="aiBubbleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4F8"/>
    </linearGradient>

    <!-- Accent bar gradient -->
    <linearGradient id="accentBarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </linearGradient>

    <!-- Green card gradient -->
    <linearGradient id="greenCardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>

    <!-- Red card gradient -->
    <linearGradient id="redCardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFEBEE"/>
    </linearGradient>

    <!-- Question mark gradient -->
    <linearGradient id="qmarkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAB40"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrowHead" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 L3,5 Z" fill="#4285F4"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="1920" height="1080" fill="#FFFFFF"/>

  <!-- ============================================ -->
  <!-- TITLE                                         -->
  <!-- ============================================ -->

  <text x="100" y="120" font-family="Trebuchet MS, Arial, sans-serif" font-size="44" font-weight="bold" fill="#1A4565">How Do You Know If an LLM Got It Right?</text>

  <!-- Thin accent underline -->
  <rect x="100" y="138" width="120" height="3" rx="1.5" fill="#4285F4"/>

  <!-- ============================================ -->
  <!-- SCENE 1: CHAT INTERFACE MOCKUP               -->
  <!-- Centered at x~200, y~400 area                -->
  <!-- ============================================ -->

  <!-- Main chat card -->
  <rect x="80" y="405" width="280" height="350" rx="14" fill="url(#cardGrad)" stroke="#E0E4E8" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Chat card header bar -->
  <rect x="80" y="405" width="280" height="44" rx="14" fill="#F5F7FA"/>
  <rect x="80" y="435" width="280" height="14" fill="#F5F7FA"/>
  <!-- Header dots (traffic lights) -->
  <circle cx="102" cy="427" r="5" fill="#E53935" opacity="0.7"/>
  <circle cx="118" cy="427" r="5" fill="#FFAB40" opacity="0.7"/>
  <circle cx="134" cy="427" r="5" fill="#4CAF50" opacity="0.7"/>
  <!-- Header title -->
  <text x="220" y="433" font-family="Roboto, Arial, sans-serif" font-size="13" fill="#78909C" text-anchor="middle">Chat</text>
  <!-- Separator line -->
  <line x1="80" y1="449" x2="360" y2="449" stroke="#E0E4E8" stroke-width="1"/>

  <!-- User message bubble 1 -->
  <rect x="160" y="465" width="180" height="38" rx="12" fill="url(#userBubbleGrad)" stroke="#4285F4" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="172" y="477" width="100" height="4" rx="2" fill="#4285F4" opacity="0.25"/>
  <rect x="172" y="487" width="60" height="4" rx="2" fill="#4285F4" opacity="0.18"/>

  <!-- AI response bubble 1 -->
  <rect x="100" y="515" width="210" height="60" rx="12" fill="url(#aiBubbleGrad)" stroke="#E0E4E8" stroke-width="1"/>
  <rect x="114" y="529" width="140" height="4" rx="2" fill="#78909C" opacity="0.30"/>
  <rect x="114" y="539" width="170" height="4" rx="2" fill="#78909C" opacity="0.25"/>
  <rect x="114" y="549" width="120" height="4" rx="2" fill="#78909C" opacity="0.20"/>
  <rect x="114" y="559" width="90" height="4" rx="2" fill="#78909C" opacity="0.15"/>

  <!-- User message bubble 2 -->
  <rect x="180" y="589" width="160" height="32" rx="12" fill="url(#userBubbleGrad)" stroke="#4285F4" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="194" y="601" width="80" height="4" rx="2" fill="#4285F4" opacity="0.25"/>

  <!-- AI response bubble 2 (larger) -->
  <rect x="100" y="633" width="230" height="80" rx="12" fill="url(#aiBubbleGrad)" stroke="#E0E4E8" stroke-width="1"/>
  <rect x="114" y="647" width="160" height="4" rx="2" fill="#78909C" opacity="0.30"/>
  <rect x="114" y="657" width="190" height="4" rx="2" fill="#78909C" opacity="0.25"/>
  <rect x="114" y="667" width="150" height="4" rx="2" fill="#78909C" opacity="0.20"/>
  <rect x="114" y="677" width="170" height="4" rx="2" fill="#78909C" opacity="0.18"/>
  <rect x="114" y="687" width="100" height="4" rx="2" fill="#78909C" opacity="0.15"/>

  <!-- Small AI icon -->
  <circle cx="104" cy="651" r="8" fill="#4285F4" opacity="0.15"/>
  <text x="104" y="655" font-family="Roboto, Arial, sans-serif" font-size="10" fill="#4285F4" text-anchor="middle" opacity="0.6">AI</text>

  <!-- Label: "LLM responds" -->
  <text x="220" y="795" font-family="Roboto, Arial, sans-serif" font-size="20" fill="#78909C" text-anchor="middle">LLM responds</text>

  <!-- ============================================ -->
  <!-- CURVED ARROW 1: Scene 1 -> Scene 2           -->
  <!-- ============================================ -->

  <path d="M 390 585 C 480 505, 560 505, 640 585" stroke="#4285F4" stroke-width="3" fill="none" marker-end="url(#arrowHead)" opacity="0.6"/>

  <!-- ============================================ -->
  <!-- SCENE 2: DOCUMENT WITH QUESTION MARKS        -->
  <!-- Centered at x~760                            -->
  <!-- ============================================ -->

  <!-- Document card -->
  <rect x="660" y="405" width="280" height="350" rx="14" fill="url(#cardGrad)" stroke="#E0E4E8" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Document header -->
  <rect x="660" y="405" width="280" height="44" rx="14" fill="#F5F7FA"/>
  <rect x="660" y="435" width="280" height="14" fill="#F5F7FA"/>
  <text x="800" y="433" font-family="Roboto, Arial, sans-serif" font-size="13" fill="#78909C" text-anchor="middle">Evaluation</text>
  <line x1="660" y1="449" x2="940" y2="449" stroke="#E0E4E8" stroke-width="1"/>

  <!-- Document lines (text representation) -->
  <rect x="690" y="469" width="180" height="5" rx="2.5" fill="#1A4565" opacity="0.12"/>
  <rect x="690" y="485" width="220" height="5" rx="2.5" fill="#1A4565" opacity="0.10"/>
  <rect x="690" y="501" width="160" height="5" rx="2.5" fill="#1A4565" opacity="0.08"/>

  <!-- Checkbox rows -->
  <!-- Row 1: checked -->
  <rect x="690" y="527" width="16" height="16" rx="3" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
  <polyline points="694,535 697,539 703,531" stroke="#4CAF50" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="716" y="531" width="140" height="4" rx="2" fill="#1A4565" opacity="0.15"/>

  <!-- Row 2: checked -->
  <rect x="690" y="555" width="16" height="16" rx="3" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
  <polyline points="694,563 697,567 703,559" stroke="#4CAF50" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="716" y="559" width="120" height="4" rx="2" fill="#1A4565" opacity="0.15"/>

  <!-- Row 3: question mark -->
  <rect x="690" y="583" width="16" height="16" rx="3" fill="none" stroke="#FFAB40" stroke-width="1.5"/>
  <text x="698" y="596" font-family="Roboto, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFAB40" text-anchor="middle">?</text>
  <rect x="716" y="587" width="160" height="4" rx="2" fill="#1A4565" opacity="0.12"/>

  <!-- Row 4: question mark -->
  <rect x="690" y="611" width="16" height="16" rx="3" fill="none" stroke="#FFAB40" stroke-width="1.5"/>
  <text x="698" y="624" font-family="Roboto, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFAB40" text-anchor="middle">?</text>
  <rect x="716" y="615" width="130" height="4" rx="2" fill="#1A4565" opacity="0.12"/>

  <!-- Row 5: X mark -->
  <rect x="690" y="639" width="16" height="16" rx="3" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <line x1="694" y1="643" x2="702" y2="651" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
  <line x1="702" y1="643" x2="694" y2="651" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
  <rect x="716" y="643" width="110" height="4" rx="2" fill="#1A4565" opacity="0.12"/>

  <!-- More text lines -->
  <rect x="690" y="673" width="200" height="4" rx="2" fill="#1A4565" opacity="0.08"/>
  <rect x="690" y="687" width="170" height="4" rx="2" fill="#1A4565" opacity="0.06"/>

  <!-- Large overlaid question mark -->
  <text x="870" y="695" font-family="Trebuchet MS, Arial, sans-serif" font-size="160" font-weight="bold" fill="url(#qmarkGrad)" opacity="0.35">?</text>

  <!-- Label: "But is it correct?" -->
  <text x="800" y="795" font-family="Roboto, Arial, sans-serif" font-size="20" fill="#78909C" text-anchor="middle">But is it correct?</text>

  <!-- ============================================ -->
  <!-- CURVED ARROW 2: Scene 2 -> Scene 3           -->
  <!-- ============================================ -->

  <path d="M 970 585 C 1060 505, 1140 505, 1220 585" stroke="#4285F4" stroke-width="3" fill="none" marker-end="url(#arrowHead)" opacity="0.6"/>

  <!-- ============================================ -->
  <!-- SCENE 3: SPLIT OUTCOME                       -->
  <!-- Centered at x~1420                           -->
  <!-- ============================================ -->

  <!-- Container card (subtle background) -->
  <rect x="1240" y="405" width="580" height="350" rx="14" fill="#F5F7FA" stroke="#E0E4E8" stroke-width="1" filter="url(#shadow)" opacity="0.5"/>

  <!-- ===== TOP CARD: Verified correct ===== -->
  <rect x="1280" y="435" width="500" height="130" rx="12" fill="url(#greenCardGrad)" stroke="#4CAF50" stroke-width="2" filter="url(#shadowSmall)"/>

  <!-- Green checkmark circle -->
  <circle cx="1340" cy="500" r="30" fill="#4CAF50" opacity="0.12"/>
  <circle cx="1340" cy="500" r="20" fill="#4CAF50" opacity="0.20"/>
  <!-- Checkmark -->
  <polyline points="1328,500 1336,510 1354,487" stroke="#4CAF50" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Text content -->
  <text x="1390" y="485" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#4CAF50">Verified Correct</text>
  <text x="1390" y="513" font-family="Roboto, Arial, sans-serif" font-size="16" fill="#78909C">Template matched, all checks passed</text>

  <!-- Score badge -->
  <rect x="1680" y="475" width="70" height="32" rx="16" fill="#4CAF50" opacity="0.15"/>
  <text x="1715" y="497" font-family="Roboto, Arial, sans-serif" font-size="16" font-weight="bold" fill="#4CAF50" text-anchor="middle">1.0</text>

  <!-- ===== BOTTOM CARD: Wrong answer ===== -->
  <rect x="1280" y="595" width="500" height="130" rx="12" fill="url(#redCardGrad)" stroke="#E53935" stroke-width="2" filter="url(#shadowSmall)"/>

  <!-- Red X circle -->
  <circle cx="1340" cy="660" r="30" fill="#E53935" opacity="0.10"/>
  <circle cx="1340" cy="660" r="20" fill="#E53935" opacity="0.18"/>
  <!-- X mark -->
  <line x1="1328" y1="648" x2="1352" y2="672" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
  <line x1="1352" y1="648" x2="1328" y2="672" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>

  <!-- Text content -->
  <text x="1390" y="645" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#E53935">Wrong Answer</text>
  <text x="1390" y="673" font-family="Roboto, Arial, sans-serif" font-size="16" fill="#78909C">Verification failed, mismatch detected</text>

  <!-- Score badge -->
  <rect x="1680" y="635" width="70" height="32" rx="16" fill="#E53935" opacity="0.12"/>
  <text x="1715" y="657" font-family="Roboto, Arial, sans-serif" font-size="16" font-weight="bold" fill="#E53935" text-anchor="middle">0.0</text>

  <!-- "OR" divider between cards -->
  <circle cx="1530" cy="573" r="18" fill="#FFFFFF" stroke="#E0E4E8" stroke-width="1.5"/>
  <text x="1530" y="579" font-family="Roboto, Arial, sans-serif" font-size="13" font-weight="bold" fill="#78909C" text-anchor="middle">or</text>

  <!-- Label: "You need a system" -->
  <text x="1530" y="795" font-family="Roboto, Arial, sans-serif" font-size="22" font-weight="bold" fill="#1A4565" text-anchor="middle">You need a system</text>

  <!-- ============================================ -->
  <!-- BOTTOM ACCENT BAR                             -->
  <!-- ============================================ -->

  <rect x="0" y="1074" width="1920" height="6" fill="url(#accentBarGrad)"/>

</svg>